name: "Develop Lineage Dry Run"

on:
  workflow_dispatch:
  merge_group:
    types: [ checks_requested ]
    branches: [ develop ]
  pull_request:
    branches:
      - develop
    types: [ opened, synchronize ]

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: true

jobs:
  build-lineage-validation:
    permissions:
      contents: read
      actions: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Keystore
        uses: ./.github/actions/setup-keystore
        with:
          keystore-type: debug
        env:
          ENCODED_KEYSTORE_DEBUG: ${{ secrets.ENCODED_KEYSTORE_DEBUG }}
          ENCODED_KEYSTORE_PRE_RELEASE: ${{ secrets.ENCODED_KEYSTORE_PRE_RELEASE }}
          ENCODED_KEYSTORE_INTERNAL_RELEASE: ${{ secrets.ENCODED_KEYSTORE_INTERNAL_RELEASE }}
          ENCODED_KEYSTORE_PUBLIC_RELEASE: ${{ secrets.ENCODED_KEYSTORE_PUBLIC_RELEASE }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set build environment variables
        env:
          SIGNING_KEY_ALIAS_DEBUG: ${{ secrets.SIGNING_KEY_ALIAS_DEBUG }}
          SIGNING_KEY_PASSWORD_DEBUG: ${{ secrets.SIGNING_KEY_PASSWORD_DEBUG }}
          SIGNING_STORE_PASSWORD_DEBUG: ${{ secrets.SIGNING_STORE_PASSWORD_DEBUG }}
        run: |
          echo "::add-mask::${SIGNING_KEY_PASSWORD_DEBUG}"
          echo "::add-mask::${SIGNING_STORE_PASSWORD_DEBUG}"
          echo "KEYSTORE_KEY_NAME_DEBUG=${SIGNING_KEY_ALIAS_DEBUG}" >> $GITHUB_ENV
          echo "KEYPWD_DEBUG=${SIGNING_KEY_PASSWORD_DEBUG}" >> $GITHUB_ENV
          echo "KEYSTOREPWD_DEBUG=${SIGNING_STORE_PASSWORD_DEBUG}" >> $GITHUB_ENV

      - name: Debug lineage materials
        env:
          CURRENT_KEYSTORE_B64: ${{ secrets.ENCODED_KEYSTORE_DEBUG_DRYRUN }}
          CURRENT_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS_DEBUG_DRYRUN }}
          CURRENT_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD_DEBUG_DRYRUN }}
          CURRENT_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD_DEBUG_DRYRUN }}
          OLD_KEYSTORE_B64: ${{ secrets.ENCODED_KEYSTORE_DEBUG }}
          OLD_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS_DEBUG }}
          OLD_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD_DEBUG }}
          OLD_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD_DEBUG }}
          APK_SIGNING_LINEAGE_B64: ${{ secrets.APK_SIGNING_LINEAGE_DEBUG_DRYRUN_B64 }}
        run: |
          set -uo pipefail

          APKSIGNER_BIN="$(command -v apksigner || true)"
          if [ -z "${APKSIGNER_BIN}" ]; then
            for build_tools_dir in \
              "${ANDROID_HOME:-}/build-tools" \
              "${ANDROID_SDK_ROOT:-}/build-tools" \
              "${ANDROID_SDK:-}/build-tools" \
              "${HOME}/Library/Android/sdk/build-tools"; do
              if [ -d "${build_tools_dir}" ]; then
                APKSIGNER_BIN="$(find "${build_tools_dir}" -name apksigner -type f | sort -V | tail -n1)"
                if [ -n "${APKSIGNER_BIN}" ]; then
                  break
                fi
              fi
            done
          fi

          if [ -z "${APKSIGNER_BIN}" ]; then
            echo "Could not locate apksigner"
            exit 1
          fi

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          OLD_KEYSTORE_PATH="${TMP_DIR}/old-debug.keystore"
          CURRENT_KEYSTORE_PATH="${TMP_DIR}/current-debug-dryrun.keystore"
          LINEAGE_PATH="${TMP_DIR}/debug-dryrun.lineage"

          old_keypass_args=()
          current_keypass_args=()
          if [ -n "${OLD_KEY_PASSWORD}" ]; then
            old_keypass_args=(-keypass "${OLD_KEY_PASSWORD}")
          fi
          if [ -n "${CURRENT_KEY_PASSWORD}" ]; then
            current_keypass_args=(-keypass "${CURRENT_KEY_PASSWORD}")
          fi

          printf '%s' "${OLD_KEYSTORE_B64}" | base64 -d > "${OLD_KEYSTORE_PATH}"
          printf '%s' "${CURRENT_KEYSTORE_B64}" | base64 -d > "${CURRENT_KEYSTORE_PATH}"
          printf '%s' "${APK_SIGNING_LINEAGE_B64}" | base64 -d > "${LINEAGE_PATH}"

          echo "Decoded file sizes:"
          ls -lh "${OLD_KEYSTORE_PATH}" "${CURRENT_KEYSTORE_PATH}" "${LINEAGE_PATH}"

          echo "Inspecting old signer alias: ${OLD_KEY_ALIAS}"
          OLD_LOG="${TMP_DIR}/old-signer.log"
          if ! keytool -list -v \
            -keystore "${OLD_KEYSTORE_PATH}" \
            -alias "${OLD_KEY_ALIAS}" \
            -storepass "${OLD_STORE_PASSWORD}" \
            "${old_keypass_args[@]}" > "${OLD_LOG}" 2>&1; then
            cat "${OLD_LOG}"
            echo "Failed to inspect old signer with alias '${OLD_KEY_ALIAS}'. Available aliases in old keystore:"
            keytool -list \
              -keystore "${OLD_KEYSTORE_PATH}" \
              -storepass "${OLD_STORE_PASSWORD}" || true
            exit 1
          fi
          cat "${OLD_LOG}"

          echo "Inspecting current signer alias: ${CURRENT_KEY_ALIAS}"
          CURRENT_LOG="${TMP_DIR}/current-signer.log"
          if ! keytool -list -v \
            -keystore "${CURRENT_KEYSTORE_PATH}" \
            -alias "${CURRENT_KEY_ALIAS}" \
            -storepass "${CURRENT_STORE_PASSWORD}" \
            "${current_keypass_args[@]}" > "${CURRENT_LOG}" 2>&1; then
            cat "${CURRENT_LOG}"
            echo "Failed to inspect current signer with alias '${CURRENT_KEY_ALIAS}'. Available aliases in current keystore:"
            keytool -list \
              -keystore "${CURRENT_KEYSTORE_PATH}" \
              -storepass "${CURRENT_STORE_PASSWORD}" || true
            exit 1
          fi
          cat "${CURRENT_LOG}"

          echo "Inspecting lineage contents"
          LINEAGE_LOG="${TMP_DIR}/lineage.log"
          if ! "${APKSIGNER_BIN}" lineage \
            --in "${LINEAGE_PATH}" \
            --print-certs \
            --verbose > "${LINEAGE_LOG}" 2>&1; then
            cat "${LINEAGE_LOG}"
            echo "Failed to inspect lineage file"
            exit 1
          fi
          cat "${LINEAGE_LOG}"

      - name: Build DevDebug APK
        env:
          DATADOG_APP_ID: ${{ secrets.DATADOG_APP_ID }}
          DATADOG_CLIENT_TOKEN: ${{ secrets.DATADOG_CLIENT_TOKEN }}
          ENABLE_SIGNING: ${{ secrets.ENABLE_SIGNING }}
          DOMAIN_REMOVAL_KEYS_FOR_REPAIR: ${{ secrets.DOMAIN_REMOVAL_KEYS_FOR_REPAIR }}
        run: ./gradlew app:assembleDevDebug

      - name: Apply lineage signing to DevDebug APK
        env:
          APK_DIR: app/build/outputs/apk/dev/debug
          CURRENT_KEYSTORE_B64: ${{ secrets.ENCODED_KEYSTORE_DEBUG_DRYRUN }}
          CURRENT_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS_DEBUG_DRYRUN }}
          CURRENT_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD_DEBUG_DRYRUN }}
          CURRENT_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD_DEBUG_DRYRUN }}
          OLD_KEYSTORE_B64: ${{ secrets.ENCODED_KEYSTORE_DEBUG }}
          OLD_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS_DEBUG }}
          OLD_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD_DEBUG }}
          OLD_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD_DEBUG }}
          APK_SIGNING_LINEAGE_B64: ${{ secrets.APK_SIGNING_LINEAGE_DEBUG_DRYRUN_B64 }}
        run: |
          CURRENT_KEYSTORE_PATH="${RUNNER_TEMP}/keystore/debug-lineage-current.keystore"
          mkdir -p "$(dirname "${CURRENT_KEYSTORE_PATH}")"
          printf '%s' "${CURRENT_KEYSTORE_B64}" | base64 -d > "${CURRENT_KEYSTORE_PATH}"
          chmod 600 "${CURRENT_KEYSTORE_PATH}"
          export CURRENT_KEYSTORE_PATH
          chmod +x scripts/lineage-sign-apks.sh
          scripts/lineage-sign-apks.sh

      - name: Upload lineage APK artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Dev-Debug-lineage-artifacts
          path: app/build/outputs/apk/dev/debug/
          retention-days: 7
