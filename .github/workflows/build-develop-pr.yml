name: "Develop"

on:
  merge_group:
    types: [ checks_requested ]
    branches: [ develop ]
  pull_request:
    branches:
      - develop
    types: [ opened, synchronize ]

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: true

jobs:
  # Build for PR and merge group validation (no store deployment)
  build-validation:
    permissions:
      contents: write
      actions: read
      security-events: write
    uses: ./.github/workflows/build-unified.yml
    with:
      concurrency-group-suffix: pr
      # TODO: Restore Dev/Debug and remove s3-use-pr-folder after QA finishes validating this temporary Alpha/Compat artifact.
      # This branch needs the PR S3 artifact to match the alpha compat path used by Jenkins/develop builds.
      build-config: |
        [
          {
            "flavor": "Alpha",
            "variant": "Compat",
            "keystore-type": "internal",
            "build-type": "apk",
            "generate-version-file": false,
            "s3-use-pr-folder": "false",
            "deployment-targets": [
              {
                "type": "s3"
              }
            ]
          }
        ]
      enable-deployment: true
    secrets: inherit
