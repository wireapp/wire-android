name: "Develop Push"

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build for direct pushes to develop (includes alpha flavor deployment to the internal store)
  build-develop:
    permissions:
      contents: write
      actions: read
      security-events: write
    uses: ./.github/workflows/build-unified.yml
    with:
      concurrency-group-suffix: push
      build-config: |
        [
          {
            "flavor": "Alpha",
            "variant": "Compat",
            "keystore-type": "internal",
            "build-type": "both",
            "generate-version-file": false,
            "deployment-targets": [
              {
                "type": "s3"
              },
              {
                "type": "google-play",
                "package-name": "com.wire.internal",
                "track": "${{ vars.INTERNAL_APP_TRACK }}",
                "status": "completed"
              }
            ]
          }
        ]
      enable-deployment: true
    secrets: inherit
