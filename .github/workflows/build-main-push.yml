name: "Main Push"

on:
  push:
    branches:
      - ms/main-test

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # Build for direct pushes to main (includes beta deployment)
  build-beta:
    uses: ./.github/workflows/build-unified.yml
    with:
      concurrency-group-suffix: push
      build-config: |
        [
          {
            "flavor": "Beta",
            "variant": "Release",
            "keystore-type": "prerelease",
            "build-type": "both",
            "generate-version-file": false,
            "deployment-targets": [
            ]
          }
        ]
      enable-deployment: false
    secrets: inherit
