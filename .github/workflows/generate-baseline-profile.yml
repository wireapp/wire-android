name: "Generate Baseline Profile"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"
  push:
    branches:
      - 'perf/ci-scheduled-runs'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-baseline-profile
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.ANDROID_BOB_GH_TOKEN }}
  BASE_BRANCH: develop
  REFRESH_BRANCH: chore/baseline-profile-refresh
  OP_VAULT: "Test Automation"
  TARGET_PACKAGE: com.wire

jobs:
  generate:
    name: Generate baseline profile (prod compatrelease)
    runs-on:
      - self-hosted
      - Linux
      - X64
      - office
      - android-qa
    timeout-minutes: 90

    defaults:
      run:
        shell: bash

    steps:
      # TODO: Revert to `ref: ${{ env.BASE_BRANCH }}` once the baseline profile setup
      # (baselineprofile plugin, benchmark module conversion) is merged to develop.
      # Using github.ref allows testing the workflow on the feature branch before merge.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          clean: true
          fetch-depth: 0
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v3

      - name: Fetch runtime secrets
        run: OP_SERVICE_ACCOUNT_TOKEN="${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}" bash scripts/qa_android_ui_tests/execution_setup.sh fetch-runtime-secrets

      - name: Setup public keystore
        uses: ./.github/actions/setup-keystore
        with:
          keystore-type: public
        env:
          ENCODED_KEYSTORE_PUBLIC_RELEASE: ${{ secrets.ENCODED_KEYSTORE_PUBLIC_RELEASE }}

      - name: Set signing environment
        run: |
          echo "ENABLE_SIGNING=TRUE" >> "$GITHUB_ENV"
          echo "::add-mask::${{ secrets.SIGNING_KEY_PASSWORD_PUBLIC_RELEASE }}"
          echo "::add-mask::${{ secrets.SIGNING_STORE_PASSWORD_PUBLIC_RELEASE }}"
          echo "KEYSTORE_KEY_NAME_COMPAT_RELEASE=${{ secrets.SIGNING_KEY_ALIAS_PUBLIC_RELEASE }}" >> "$GITHUB_ENV"
          echo "KEYPWD_COMPAT_RELEASE=${{ secrets.SIGNING_KEY_PASSWORD_PUBLIC_RELEASE }}" >> "$GITHUB_ENV"
          echo "KEYSTOREPWD_COMPAT_RELEASE=${{ secrets.SIGNING_STORE_PASSWORD_PUBLIC_RELEASE }}" >> "$GITHUB_ENV"

      - name: Verify at least one device connected
        run: |
          adb devices
          DEVICE_COUNT="$(adb devices | awk '$2 == "device" { count++ } END { print count + 0 }')"
          test "$DEVICE_COUNT" -ge 1

      - name: Capture device metadata
        id: device
        run: |
          echo "model=$(adb shell getprop ro.product.model | tr -d '\r')" >> "$GITHUB_OUTPUT"
          echo "sdk=$(adb shell getprop ro.build.version.sdk | tr -d '\r')" >> "$GITHUB_OUTPUT"

      - name: Generate baseline + startup profile
        run: |
          ./gradlew :app:generateProdCompatreleaseBaselineProfile \
            -Pandroid.testInstrumentationRunnerArguments.BACKEND_NAME="STAGING" \
            -Pandroid.testInstrumentationRunnerArguments.TARGET_PACKAGE="$TARGET_PACKAGE" \
            --no-daemon \
            --no-configuration-cache

          mkdir -p app/src/main
          cp app/src/prodCompatrelease/generated/baselineProfiles/baseline-prof.txt app/src/main/baseline-prof.txt
          cp app/src/prodCompatrelease/generated/baselineProfiles/startup-prof.txt app/src/main/startup-prof.txt

      - name: Verify generated profiles
        run: |
          test -s app/src/main/baseline-prof.txt
          test -s app/src/main/startup-prof.txt

      - name: Run startup-with-login benchmark with and without profile
        run: |
          ./gradlew :benchmark:connectedProdBenchmarkBenchmarkAndroidTest \
            -Pandroid.testInstrumentationRunnerArguments.class=com.wire.benchmark.StartupBenchmarkWithLogin \
            -Pandroid.testInstrumentationRunnerArguments.BACKEND_NAME="STAGING" \
            -Pandroid.testInstrumentationRunnerArguments.TARGET_PACKAGE="$TARGET_PACKAGE" \
            --rerun-tasks \
            --no-daemon \
            --no-configuration-cache

      - name: Archive normalized measurement snapshot
        id: snapshot
        run: |
          SNAPSHOT_DIR="benchmark/baselines/$(date -u +%Y-%m-%d)-post-profile/prodBenchmarkBenchmark/connected"
          rm -rf "$SNAPSHOT_DIR/device"
          mkdir -p "$SNAPSHOT_DIR"
          cp -r benchmark/build/outputs/connected_android_test_additional_output/prodBenchmarkBenchmark/connected/* \
            "$SNAPSHOT_DIR/device"
          echo "snapshot_dir=$SNAPSHOT_DIR/device" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark outputs
        uses: actions/upload-artifact@v7
        with:
          name: baseline-profile-${{ github.run_id }}
          path: |
            app/src/prodCompatrelease/generated/baselineProfiles/*
            benchmark/build/outputs/connected_android_test_additional_output/prodBenchmarkBenchmark/**
            ${{ steps.snapshot.outputs.snapshot_dir }}
          if-no-files-found: error

      - name: Setup GitHub Actions bot for Git
        uses: fregante/setup-git-user@v2

      - name: Commit refresh branch
        id: commit
        run: |
          git checkout -B "$REFRESH_BRANCH"
          git add app/src/main/baseline-prof.txt
          git add app/src/main/startup-prof.txt
          git add "${{ steps.snapshot.outputs.snapshot_dir }}"

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: refresh baseline profile"
          git push --force origin "$REFRESH_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR if missing
        if: steps.commit.outputs.changed == 'true'
        env:
          DEVICE_MODEL: ${{ steps.device.outputs.model }}
          DEVICE_SDK: ${{ steps.device.outputs.sdk }}
          SNAPSHOT_DIR: ${{ steps.snapshot.outputs.snapshot_dir }}
        run: |
          BODY_FILE="$(mktemp)"
          cat > "$BODY_FILE" <<EOF
          Auto-generated by [.github/workflows/generate-baseline-profile.yml](https://github.com/${{ github.repository }}/blob/${{ env.BASE_BRANCH }}/.github/workflows/generate-baseline-profile.yml).

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Device: ${DEVICE_MODEL} (SDK ${DEVICE_SDK})
          Snapshot: \`${SNAPSHOT_DIR}\`
          EOF

          PR_NUMBER="$(gh pr list --head "$REFRESH_BRANCH" --base "$BASE_BRANCH" --json number -q '.[0].number')"
          if [[ -z "$PR_NUMBER" ]]; then
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$REFRESH_BRANCH" \
              --title "chore: refresh baseline profile" \
              --label performance \
              --body-file "$BODY_FILE"
          fi
