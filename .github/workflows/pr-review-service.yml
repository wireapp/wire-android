name: "Automated PR Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REVIEW_SERVICE_URL: http://91.99.71.160:8080/review-pr
      COMMENT_MARKER: '<!-- pr-review-service -->'
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Generate automated review and update PR comment
        shell: bash
        run: |
          set -u

          comment_id="$(
            gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
              --jq ".[] | select(.body | contains(\"${COMMENT_MARKER}\")) | .id" \
              | head -n 1
          )"

          summarize_failure() {
            local message="$1"

            {
              echo "### Automated PR Review"
              echo "${message}"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          publish_comment() {
            local body_file="$1"
            local request_json

            request_json=$(mktemp)
            jq -Rs '{body: .}' < "${body_file}" > "${request_json}"

            if [ -n "${comment_id}" ]; then
              gh api "repos/${REPOSITORY}/issues/comments/${comment_id}" \
                -X PATCH \
                --input "${request_json}" >/dev/null
            else
              gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
                --input "${request_json}" >/dev/null
            fi
          }

          create_failure_comment_if_missing() {
            if [ -n "${comment_id}" ]; then
              return
            fi

            local body
            body=$(mktemp)
            {
              echo "${COMMENT_MARKER}"
              echo "## Automated PR Review"
              echo
              echo "_Automated review could not be generated for this run._"
            } > "${body}"

            publish_comment "${body}"
          }

          payload=$(mktemp)
          response=$(mktemp)
          error_log=$(mktemp)
          comment_body=$(mktemp)

          jq -n --arg pr_url "${PR_URL}" '{pr_url: $pr_url}' > "${payload}"

          http_code="$(
            curl \
              --silent \
              --show-error \
              --output "${response}" \
              --write-out "%{http_code}" \
              --max-time 60 \
              -X POST "${REVIEW_SERVICE_URL}" \
              -H "Content-Type: application/json" \
              --data "@${payload}" \
              2>"${error_log}"
          )"
          curl_exit_code=$?

          if [ "${curl_exit_code}" -ne 0 ]; then
            error_message=$(cat "${error_log}")
            summarize_failure "Review service request failed: ${error_message:-curl exited with code ${curl_exit_code}}"
            create_failure_comment_if_missing
            exit 0
          fi

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            summarize_failure "Review service returned HTTP ${http_code}."
            create_failure_comment_if_missing
            exit 0
          fi

          if ! jq -e . "${response}" >/dev/null 2>&1; then
            summarize_failure "Review service returned invalid JSON."
            create_failure_comment_if_missing
            exit 0
          fi

          status=$(jq -r '.status // empty' "${response}")
          if [ "${status}" != "ok" ]; then
            summarize_failure "Review service returned status '${status:-missing}'."
            create_failure_comment_if_missing
            exit 0
          fi

          review_markdown=$(jq -r '.review_markdown // empty' "${response}")
          if [ -z "${review_markdown}" ]; then
            summarize_failure "Review service returned no review markdown."
            create_failure_comment_if_missing
            exit 0
          fi

          model=$(jq -r '.model // "unknown"' "${response}")
          elapsed_ms=$(jq -r '.elapsed_ms // "unknown"' "${response}")

          {
            echo "${COMMENT_MARKER}"
            echo "## Automated PR Review"
            echo
            echo "_Generated by \`${model}\` in ${elapsed_ms} ms._"
            echo
            printf '%s\n' "${review_markdown}"
          } > "${comment_body}"

          if ! publish_comment "${comment_body}"; then
            summarize_failure "Review was generated, but publishing the PR comment failed."
            exit 1
          fi

          {
            echo "### Automated PR Review"
            echo "Review comment posted successfully."
          } >> "$GITHUB_STEP_SUMMARY"
