name: QA Android Critical Flow Tests

# Concurrency lock:
# - If androidDeviceId is set, we lock per-device so only one run can use that specific phone at a time (other devices can run in parallel).
# - If androidDeviceId is empty ("auto"), we lock the shared device pool so only one auto-run uses the farm at a time (other auto-runs queue).
concurrency:
  group: qa-android-ui-tests-office-${{ github.event_name == 'workflow_dispatch' && inputs.androidDeviceId || 'auto' }}
  cancel-in-progress: false

on:
  # Uncomment merge_group when the team is ready to enable automatic merge queue runs.
  # merge_group:
  #   types: [checks_requested]
  # GitHub schedules use UTC. 04:00 UTC is 06:00 in Berlin during daylight saving time.
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      appBuildNumber:
        description: "AppBuildNumber. Use 'latest' or build number(e.g 71389)"
        required: true
        default: "latest"
        type: string

      isUpgrade:
        description: "Upgrade test? If true, oldBuildNumber is REQUIRED."
        required: true
        default: false
        type: boolean

      oldBuildNumber:
        description: "For upgrade runs: type the old build number here"
        required: false
        default: ""
        type: string

      enforceAppInstall:
        description: "If you want to run with a lower version than currently on the device, set this value to true."
        required: true
        default: false
        type: boolean

      flavor:
        description: "App flavor."
        required: true
        type: choice
        options:
          - internal release candidate
          - internal beta
          - staging compat
          - experimental
          - column-1
          - column-2
          - column-3
          - debug
          - fdroid
          - production
        default: internal release candidate

      TAGS:
        description: "Tags: '@regression' OR '@TC-8143'."
        required: false
        default: ""
        type: string

      testinyRunName:
        description: "TESTINY_RUN_NAME."
        required: false
        default: ""
        type: string

      androidDeviceId:
        description: "androidDeviceId. Target a specific device. Leave empty for auto."
        required: false
        default: ""
        type: string

      rerunFailedEnabled:
        description: "Automatically rerun only failed tests in this run."
        required: true
        default: true
        type: boolean

      rerunFailedCount:
        description: "How many failed-test rerun attempts (0-3). Default is 1."
        required: true
        default: "1"
        type: string

permissions:
  contents: read

jobs:
  # Validate user inputs and derive selectors.
  validate-and-resolve-inputs:
    name: Validate + resolve selectors
    runs-on: ubuntu-latest

    outputs:
      resolvedAppBuildNumber: ${{ steps.resolve_run_inputs.outputs.appBuildNumber }}
      resolvedIsUpgrade: ${{ steps.resolve_run_inputs.outputs.isUpgrade }}
      resolvedOldBuildNumber: ${{ steps.resolve_run_inputs.outputs.oldBuildNumber }}
      resolvedEnforceAppInstall: ${{ steps.resolve_run_inputs.outputs.enforceAppInstall }}
      resolvedFlavor: ${{ steps.resolve_run_inputs.outputs.flavor }}
      resolvedTags: ${{ steps.resolve_run_inputs.outputs.TAGS }}
      resolvedTestinyRunName: ${{ steps.resolve_run_inputs.outputs.testinyRunName }}
      resolvedAndroidDeviceId: ${{ steps.resolve_run_inputs.outputs.androidDeviceId }}
      resolvedRerunFailedEnabled: ${{ steps.resolve_run_inputs.outputs.rerunFailedEnabled }}
      resolvedRerunFailedCount: ${{ steps.resolve_run_inputs.outputs.rerunFailedCount }}
      resolvedTestCaseId: ${{ steps.resolve_selector.outputs.testCaseId }}
      resolvedCategory: ${{ steps.resolve_selector.outputs.category }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Scheduled and PR runs do not have UI inputs, so resolve one shared set
      # of values here and let later jobs consume the same outputs.
      - name: Resolve run inputs
        id: resolve_run_inputs
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            {
              echo "appBuildNumber=${{ inputs.appBuildNumber }}"
              echo "isUpgrade=${{ inputs.isUpgrade }}"
              echo "oldBuildNumber=${{ inputs.oldBuildNumber }}"
              echo "enforceAppInstall=${{ inputs.enforceAppInstall }}"
              echo "flavor=${{ inputs.flavor }}"
              echo "TAGS=${{ inputs.TAGS }}"
              echo "testinyRunName=${{ inputs.testinyRunName }}"
              echo "androidDeviceId=${{ inputs.androidDeviceId }}"
              echo "rerunFailedEnabled=${{ inputs.rerunFailedEnabled }}"
              echo "rerunFailedCount=${{ inputs.rerunFailedCount }}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "appBuildNumber=latest"
            echo "isUpgrade=false"
            echo "oldBuildNumber="
            echo "enforceAppInstall=false"
            echo "flavor=internal release candidate"
            echo "TAGS=@criticalFlow"
            echo "testinyRunName="
            echo "androidDeviceId="
            echo "rerunFailedEnabled=true"
            echo "rerunFailedCount=1"
          } >> "${GITHUB_OUTPUT}"

      # Validate upgrade inputs before runner work starts.
      - name: Validate upgrade inputs
        shell: bash
        env:
          IS_UPGRADE: ${{ steps.resolve_run_inputs.outputs.isUpgrade }}
          OLD_BUILD_NUMBER: ${{ steps.resolve_run_inputs.outputs.oldBuildNumber }}
        run: bash scripts/qa_android_ui_tests/validation.sh validate-upgrade-inputs

      # Validate retry toggle/count before any runner work starts.
      - name: Validate rerun inputs
        shell: bash
        env:
          RERUN_FAILED_ENABLED: ${{ steps.resolve_run_inputs.outputs.rerunFailedEnabled }}
          RERUN_FAILED_COUNT: ${{ steps.resolve_run_inputs.outputs.rerunFailedCount }}
        run: bash scripts/qa_android_ui_tests/validation.sh validate-rerun-inputs

      # Resolve TAGS into CI selectors and expose them as job outputs.
      - name: Resolve selector from TAGS
        id: resolve_selector
        shell: bash
        env:
          TAGS_RAW: ${{ steps.resolve_run_inputs.outputs.TAGS }}
        run: bash scripts/qa_android_ui_tests/validation.sh resolve-selector-from-tags

      # Print resolved values for traceability in workflow logs.
      - name: Print resolved values
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.ref_name }}
          FLAVOR_INPUT: ${{ steps.resolve_run_inputs.outputs.flavor }}
          RESOLVED_TESTCASE_ID: ${{ steps.resolve_selector.outputs.testCaseId }}
          RESOLVED_CATEGORY: ${{ steps.resolve_selector.outputs.category }}
          TESTINY_RUN_NAME: ${{ steps.resolve_run_inputs.outputs.testinyRunName }}
        run: bash scripts/qa_android_ui_tests/validation.sh print-resolved-values

  run-android-ui-tests:
    name: Run Android UI tests
    runs-on:
      - self-hosted
      - Linux
      - X64
      - office
      - android-qa

    needs: validate-and-resolve-inputs
    permissions:
      contents: write

    env:
      AWS_REGION: eu-west-1
      OP_VAULT: "Test Automation"
      FLAVORS_CONFIG_PATH: "/etc/android-qa/flavors.json"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          clean: true
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK (ANDROID_HOME + adb)
        uses: android-actions/setup-android@v4

      # Verify required CLIs on the runner before setup continues.
      - name: Ensure required tools exist
        run: bash scripts/qa_android_ui_tests/execution_setup.sh ensure-required-tools

      # Flavor resolution is runner-driven (from /etc/android-qa/flavors.json), not hardcoded in repo.
      # This bash subcommand exports S3_FOLDER, APP_ID, and PACKAGES_TO_UNINSTALL for downstream steps.
      - name: Resolve flavor (runner config)
        id: resolve_flavor
        env:
          FLAVOR_INPUT: ${{ needs.validate-and-resolve-inputs.outputs.resolvedFlavor }}
        run: bash scripts/qa_android_ui_tests/execution_setup.sh resolve-flavor

      - name: Configure AWS credentials (for S3)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      # Download app APK(s) from S3 and export resolved build metadata.
      - name: Download APK(s) from S3
        id: download_apks
        env:
          APP_BUILD_NUMBER: ${{ needs.validate-and-resolve-inputs.outputs.resolvedAppBuildNumber }}
          IS_UPGRADE: ${{ needs.validate-and-resolve-inputs.outputs.resolvedIsUpgrade }}
          OLD_BUILD_NUMBER: ${{ needs.validate-and-resolve-inputs.outputs.resolvedOldBuildNumber }}
        run: S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" bash scripts/qa_android_ui_tests/execution_setup.sh download-apks

      # Select device(s): use input device when provided, otherwise auto-pick.
      - name: Detect target device(s)
        env:
          TARGET_DEVICE_ID: ${{ needs.validate-and-resolve-inputs.outputs.resolvedAndroidDeviceId }}
          RESOLVED_TESTCASE_ID: ${{ needs.validate-and-resolve-inputs.outputs.resolvedTestCaseId }}
        run: bash scripts/qa_android_ui_tests/execution_setup.sh detect-target-devices

      # Clear stale device-side Allure files early so setup failures cannot publish old reports.
      - name: Clear stale Allure results on device(s)
        run: bash scripts/qa_android_ui_tests/execution_setup.sh clear-allure-results-on-devices

      # Install app/test prerequisites on each selected device.
      - name: Install APK(s) on device(s)
        env:
          ENFORCE_APP_INSTALL: ${{ needs.validate-and-resolve-inputs.outputs.resolvedEnforceAppInstall }}
          IS_UPGRADE: ${{ needs.validate-and-resolve-inputs.outputs.resolvedIsUpgrade }}
        run: bash scripts/qa_android_ui_tests/execution_setup.sh install-apks-on-devices

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v3

      # Fetch runtime secrets only for this run.
      - name: Fetch secrets.json (runtime only)
        run: OP_SERVICE_ACCOUNT_TOKEN="${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}" bash scripts/qa_android_ui_tests/execution_setup.sh fetch-runtime-secrets

      # Build androidTest APK once and reuse it across selected devices.
      - name: Build test APK (assemble once)
        run: bash scripts/qa_android_ui_tests/execution_setup.sh build-test-apk

      # Resolve the built androidTest APK path for execution steps.
      - name: Resolve test APK path
        run: bash scripts/qa_android_ui_tests/execution_setup.sh resolve-test-apk-path

      # Resolve AndroidX Test Services APKs required for TestStorage/Allure.
      - name: Resolve AndroidX Test Services APKs (for Allure TestStorage)
        run: bash scripts/qa_android_ui_tests/execution_setup.sh resolve-test-services-apks

      # Run attempt 0, pull results immediately, then rerun only the still-failing tests.
      - name: Run UI tests (auto-rerun failed tests)
        env:
          RESOLVED_TESTCASE_ID: ${{ needs.validate-and-resolve-inputs.outputs.resolvedTestCaseId }}
          RESOLVED_CATEGORY: ${{ needs.validate-and-resolve-inputs.outputs.resolvedCategory }}
          IS_UPGRADE: ${{ needs.validate-and-resolve-inputs.outputs.resolvedIsUpgrade }}
          RERUN_FAILED_ENABLED: ${{ needs.validate-and-resolve-inputs.outputs.resolvedRerunFailedEnabled }}
          RERUN_FAILED_COUNT: ${{ needs.validate-and-resolve-inputs.outputs.resolvedRerunFailedCount }}
          ALLURE_RESULTS_ROOT: ${{ runner.temp }}/allure-results
        run: bash scripts/qa_android_ui_tests/run_ui_tests.sh

      # Export one standard artifact so future manual deflake runs can reuse
      # this workflow's exact run context and leftover failed test list.
      - name: Prepare deflake input artifact
        if: always()
        env:
          DEFLAKE_BUNDLE_DIR: ${{ runner.temp }}/deflake-input
          SOURCE_WORKFLOW_NAME: ${{ github.workflow }}
          SOURCE_WORKFLOW_FILE: ".github/workflows/qa-android-critical-flow-tests.yml"
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_NUMBER: ${{ github.run_number }}
          SOURCE_RUN_ATTEMPT: ${{ github.run_attempt }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_REF_NAME: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
          FLAVOR_INPUT: ${{ needs.validate-and-resolve-inputs.outputs.resolvedFlavor }}
          TAGS_INPUT: ${{ needs.validate-and-resolve-inputs.outputs.resolvedTags }}
          RESOLVED_TESTCASE_ID: ${{ needs.validate-and-resolve-inputs.outputs.resolvedTestCaseId }}
          RESOLVED_CATEGORY: ${{ needs.validate-and-resolve-inputs.outputs.resolvedCategory }}
          APP_BUILD_NUMBER_INPUT: ${{ needs.validate-and-resolve-inputs.outputs.resolvedAppBuildNumber }}
          IS_UPGRADE: ${{ needs.validate-and-resolve-inputs.outputs.resolvedIsUpgrade }}
          OLD_BUILD_NUMBER: ${{ needs.validate-and-resolve-inputs.outputs.resolvedOldBuildNumber }}
          ENFORCE_APP_INSTALL: ${{ needs.validate-and-resolve-inputs.outputs.resolvedEnforceAppInstall }}
          TESTINY_RUN_NAME: ${{ needs.validate-and-resolve-inputs.outputs.resolvedTestinyRunName }}
          ANDROID_DEVICE_ID: ${{ needs.validate-and-resolve-inputs.outputs.resolvedAndroidDeviceId }}
          RERUN_FAILED_ENABLED: ${{ needs.validate-and-resolve-inputs.outputs.resolvedRerunFailedEnabled }}
          RERUN_FAILED_COUNT: ${{ needs.validate-and-resolve-inputs.outputs.resolvedRerunFailedCount }}
        run: bash scripts/qa_android_ui_tests/reporting.sh prepare-deflake-bundle

      - name: Upload deflake input artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-ui-test-deflake-input
          path: ${{ runner.temp }}/deflake-input
          if-no-files-found: warn

      # Remove runtime secrets before report generation and publish steps.
      - name: Remove runtime secrets (before Allure/Pages)
        if: always()
        run: bash scripts/qa_android_ui_tests/reporting.sh remove-runtime-secrets

      # Fallback pull: keep this as a safety net in case per-attempt pull was interrupted.
      - name: Pull Allure results from device(s) (fallback)
        if: always()
        env:
          OUT_DIR: ${{ runner.temp }}/allure-results
        run: bash scripts/qa_android_ui_tests/reporting.sh pull-allure-results

      # Merge all attempts into one final dataset and stamp passed_on_rerun=true where needed.
      - name: Merge Allure results (add device label)
        if: always()
        env:
          OUT_DIR: ${{ runner.temp }}/allure-results
          MERGED_DIR: ${{ runner.temp }}/allure-results-merged
          REAL_BUILD_NUMBER: ${{ env.REAL_BUILD_NUMBER }}
          NEW_APK_NAME: ${{ env.NEW_APK_NAME }}
          INPUT_TAGS: ${{ needs.validate-and-resolve-inputs.outputs.resolvedTags }}
        run: bash scripts/qa_android_ui_tests/reporting.sh merge-allure-results

      # Generate static Allure HTML from merged results.
      - name: Generate Allure HTML report
        if: always()
        env:
          MERGED_DIR: ${{ runner.temp }}/allure-results-merged
          REPORT_DIR: ${{ runner.temp }}/allure-report
        run: bash scripts/qa_android_ui_tests/reporting.sh generate-allure-report

      - name: Checkout GitHub Pages branch
        if: always()
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1
          persist-credentials: true

      # Publish report snapshots and apply retention cleanup.
      - name: Publish Allure report to Pages branch
        id: publish_allure_report
        if: always()
        env:
          REPORT_DIR: ${{ runner.temp }}/allure-report
          PAGES_DIR: gh-pages/docs/qa-ui-tests
          PAGES_TITLE: QA Android Critical Flow Tests
          KEEP_DAYS: "90"
          INPUT_TAGS: ${{ needs.validate-and-resolve-inputs.outputs.resolvedTags }}
          APK_VERSION: ${{ env.REAL_BUILD_NUMBER }}
          APK_NAME: ${{ env.NEW_APK_NAME }}
        run: bash scripts/qa_android_ui_tests/reporting.sh publish-allure-report

      - name: Summarize merged Allure results
        id: summarize_allure_results
        if: always()
        env:
          MERGED_DIR: ${{ runner.temp }}/allure-results-merged
        run: bash scripts/qa_android_ui_tests/reporting.sh summarize-allure-results

      - name: Build Wire notification body
        id: build_wire_notification
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
          RESOLVED_TAGS: ${{ needs.validate-and-resolve-inputs.outputs.resolvedTags }}
          APK_NAME: ${{ env.NEW_APK_NAME }}
          ALLURE_REPORT_URL: ${{ steps.publish_allure_report.outputs.allure_report_url }}
          TESTS_PASSED: ${{ steps.summarize_allure_results.outputs.passed }}
          TESTS_FAILED: ${{ steps.summarize_allure_results.outputs.failed }}
          TESTS_SKIPPED: ${{ steps.summarize_allure_results.outputs.skipped }}
          TESTS_TOTAL: ${{ steps.summarize_allure_results.outputs.total }}
          TESTS_SUCCESS_PERCENT: ${{ steps.summarize_allure_results.outputs.success_percent }}
          PASSED_ON_RERUN_COUNT: ${{ env.PASSED_ON_RERUN_COUNT }}
          JOB_STATUS: ${{ job.status }}
        run: python3 scripts/qa_android_ui_tests/build_wire_notification.py

      - name: Notify Wire
        if: ${{ success() || failure() }}
        uses: ./.github/actions/report-to-wire
        with:
          webhook-url: ${{ secrets.WIRE_ANDROID_CHARON_WEBHOOK }}
          body: ${{ steps.build_wire_notification.outputs.body }}

      # Clean temporary artifacts on the runner, even after failures.
      - name: Cleanup (remove secrets + build outputs)
        if: always()
        env:
          ALLURE_RESULTS_DIR: ${{ runner.temp }}/allure-results
          ALLURE_RESULTS_MERGED_DIR: ${{ runner.temp }}/allure-results-merged
          ALLURE_REPORT_DIR: ${{ runner.temp }}/allure-report
        run: bash scripts/qa_android_ui_tests/reporting.sh cleanup-workspace
