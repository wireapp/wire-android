name: QA Android UI Tests

on:
  workflow_dispatch:
    inputs:
      appBuildNumber:
        description: "AppBuildNumber. Use 'latest' or build number(e.g 71389)"
        required: true
        default: "latest"
        type: string

      isUpgrade:
        description: "Upgrade test? If true, oldBuildNumber is REQUIRED."
        required: true
        default: false
        type: boolean

      oldBuildNumber:
        description: "For upgrade runs: type the old build number here"
        required: false
        default: ""
        type: string

      enforceAppInstall:
        description: "If you want to run with a lower version than currently on the device, set this value to true."
        required: true
        default: false
        type: boolean

      flavor:
        description: "App flavor."
        required: true
        type: choice
        options:
          - internal release candidate
          - internal beta
          - staging compat
          - experimental
          - column-1
          - column-2
          - column-3
          - debug
          - fdroid
          - production
        default: internal release candidate

      buildType:
        description: "Build type"
        required: true
        type: choice
        options:
          - release
          - debug
          - compat
        default: release

      TAGS:
        description: "Tags: '@regression' OR '@TC-8143'."
        required: false
        default: ""
        type: string

      branch:
        description: "Branch"
        required: true
        default: "develop"
        type: string

      backendType:
        description: "Backend."
        required: true
        default: "staging"
        type: string

      testinyRunName:
        description: "TESTINY_RUN_NAME."
        required: false
        default: ""
        type: string

      androidDeviceId:
        description: "androidDeviceId. Target a specific device. Leave empty for auto."
        required: false
        default: ""
        type: string

      callingServiceEnv:
        description: "Calling service environment."
        required: true
        type: choice
        options:
          - dev
          - custom
          - master
          - avs
          - qa
          - edge
          - staging
          - prod
        default: dev

      callingServiceUrl:
        description: "Calling service URL."
        required: true
        default: "loadbalanced"
        type: string

      deflakeCount:
        description: "Rerun only failed tests."
        required: true
        default: 1
        type: number

jobs:
  validate-and-resolve-inputs:
    name: Validate + resolve selector (no execution)
    runs-on: ubuntu-latest

    outputs:
      resolvedTestCaseId: ${{ steps.resolve.outputs.testCaseId }}
      resolvedCategory: ${{ steps.resolve.outputs.category }}

    steps:
      - name: Validate upgrade inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.isUpgrade }}" == "true" && -z "${{ inputs.oldBuildNumber }}" ]]; then
            echo "ERROR: oldBuildNumber is REQUIRED when isUpgrade=true"
            exit 1
          fi

      - name: Resolve selector from TAGS
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          TESTCASE_ID=""
          CATEGORY=""
          TAGS_RAW="${{ inputs.TAGS }}"

          trim() { echo "$1" | xargs; }

          if [[ -n "$(trim "${TAGS_RAW}")" ]]; then
            # TAGS can be comma-separated; use first non-empty token
            sel=""
            IFS=',' read -ra parts <<< "${TAGS_RAW}"
            for p in "${parts[@]}"; do
              t="$(trim "$p")"
              if [[ -n "$t" ]]; then
                sel="$t"
                break
              fi
            done

            # Allow user to type with or without '@'
            sel="${sel#@}"
            sel="$(trim "$sel")"

            # We dropped Tag(key,value). If someone types key:value, fail fast to avoid confusion.
            if [[ "$sel" == *:* ]]; then
              echo "ERROR: TAGS must be '@TC-####' or '@category'. (Tag key:value is not supported.)"
              exit 1
            fi

            # TC-8143 -> testCaseId
            if [[ "$sel" =~ ^TC-[0-9]+$ ]]; then
              TESTCASE_ID="$sel"
            else
              # regression -> category
              CATEGORY="$sel"
            fi
          fi

          echo "testCaseId=$TESTCASE_ID" >> "$GITHUB_OUTPUT"
          echo "category=$CATEGORY" >> "$GITHUB_OUTPUT"

          echo "Resolved selector:"
          echo "  testCaseId=$TESTCASE_ID"
          echo "  category=$CATEGORY"

  run-android-ui-tests-placeholder:
    name: Runner smoke check + checkout (no test execution yet)
    runs-on:
      - self-hosted
      - Linux
      - X64
      - office
      - android-qa

    needs: validate-and-resolve-inputs

    steps:
      - name: Checkout code at selected branch/ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Show checked out ref
        shell: bash
        run: |
          set -euo pipefail
          echo "Checked out ref input: ${{ inputs.branch }}"
          echo "Git HEAD commit: $(git rev-parse HEAD)"

      - name: Verify ADB is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v adb >/dev/null 2>&1; then
            echo "ERROR: adb is not available on this runner. Install Android platform-tools on the self-hosted runner."
            exit 1
          fi
          adb version

      - name: Show connected devices (ADB)
        shell: bash
        run: |
          set -euo pipefail
          echo "adb devices -l"
          adb devices -l

          online_count="$(adb devices | awk 'NR>1 && $2=="device"{c++} END{print c+0}')"
          if [[ "$online_count" -eq 0 ]]; then
            echo "ERROR: No online Android devices found on this runner."
            exit 1
          fi

      - name: Validate androidDeviceId (if provided)
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ inputs.androidDeviceId }}"

          if [[ -n "$TARGET" ]]; then
            echo "Target device requested: $TARGET"
            if ! adb devices | awk 'NR>1 && $2=="device"{print $1}' | grep -qx "$TARGET"; then
              echo "ERROR: androidDeviceId '$TARGET' not found in 'adb devices'."
              exit 1
            fi
            echo "OK: Target device is connected."
          else
            echo "No androidDeviceId provided -> will use any available device later."
          fi

      - name: Show what would run (preview only)
        shell: bash
        run: |
          set -euo pipefail

          RESOLVED_TC="${{ needs.validate-and-resolve-inputs.outputs.resolvedTestCaseId }}"
          RESOLVED_CAT="${{ needs.validate-and-resolve-inputs.outputs.resolvedCategory }}"

          echo "=== PREVIEW ONLY (NO TEST EXECUTION) ==="
          echo ""
          echo "Inputs:"
          echo "  appBuildNumber=${{ inputs.appBuildNumber }}"
          echo "  isUpgrade=${{ inputs.isUpgrade }}"
          echo "  oldBuildNumber=${{ inputs.oldBuildNumber }}"
          echo "  enforceAppInstall=${{ inputs.enforceAppInstall }}"
          echo "  flavor=${{ inputs.flavor }}"
          echo "  buildType=${{ inputs.buildType }}"
          echo "  TAGS=${{ inputs.TAGS }}"
          echo "  branch=${{ inputs.branch }}"
          echo "  backendType=${{ inputs.backendType }}"
          echo "  testinyRunName=${{ inputs.testinyRunName }}"
          echo "  androidDeviceId=${{ inputs.androidDeviceId }}"
          echo "  callingServiceEnv=${{ inputs.callingServiceEnv }}"
          echo "  callingServiceUrl=${{ inputs.callingServiceUrl }}"
          echo "  deflakeCount=${{ inputs.deflakeCount }}"
          echo ""
          echo "Resolved selector:"
          echo "  testCaseId=${RESOLVED_TC}"
          echo "  category=${RESOLVED_CAT}"
          echo ""

          ARGS=()
          [[ -n "${RESOLVED_TC}" ]] && ARGS+=("-Pandroid.testInstrumentationRunnerArguments.testCaseId=${RESOLVED_TC}")
          [[ -n "${RESOLVED_CAT}" ]] && ARGS+=("-Pandroid.testInstrumentationRunnerArguments.category=${RESOLVED_CAT}")

          echo "Future Gradle command (preview):"
          echo "./gradlew :tests:testsCore:connectedDebugAndroidTest ${ARGS[*]}"
