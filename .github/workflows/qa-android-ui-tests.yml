name: QA Android UI Tests

on:
  workflow_dispatch:
    inputs:
      appBuildNumber:
        description: "AppBuildNumber. Use 'latest' or build number(e.g 71389)"
        required: true
        default: "latest"
        type: string

      isUpgrade:
        description: "Upgrade test? If true, oldBuildNumber is REQUIRED."
        required: true
        default: false
        type: boolean

      oldBuildNumber:
        description: "For upgrade runs: type the old build number here"
        required: false
        default: ""
        type: string

      enforceAppInstall:
        description: "If you want to run with a lower version than currently on the device, set this value to true."
        required: true
        default: false
        type: boolean

      flavor:
        description: "App flavor."
        required: true
        type: choice
        options:
          - internal release candidate
          - internal beta
          - staging compat
          - experimental
          - column-1
          - column-2
          - column-3
          - debug
          - fdroid
          - production
        default: internal release candidate

      buildType:
        description: "Build type"
        required: true
        type: choice
        options:
          - release
          - debug
          - compat
        default: release

      TAGS:
        description: "Tags: '@regression' OR '@TC-8143'."
        required: false
        default: ""
        type: string

      branch:
        description: "Branch"
        required: true
        default: "develop"
        type: string

      backendType:
        description: "Backend."
        required: true
        default: "staging"
        type: string

      testinyRunName:
        description: "TESTINY_RUN_NAME."
        required: false
        default: ""
        type: string

      androidDeviceId:
        description: "androidDeviceId. Target a specific device. Leave empty for auto."
        required: false
        default: ""
        type: string

      callingServiceEnv:
        description: "Calling service environment."
        required: true
        type: choice
        options:
          - dev
          - custom
          - master
          - avs
          - qa
          - edge
          - staging
          - prod
        default: dev

      callingServiceUrl:
        description: "Calling service URL."
        required: true
        default: "loadbalanced"
        type: string

      deflakeCount:
        description: "Rerun only failed tests."
        required: true
        default: 1
        type: number

permissions:
  contents: read

jobs:
  validate-and-resolve-inputs:
    name: Validate + resolve selectors (no execution)
    runs-on: ubuntu-latest

    outputs:
      resolvedTestCaseId: ${{ steps.resolve.outputs.testCaseId }}
      resolvedCategory: ${{ steps.resolve.outputs.category }}

    steps:
      - name: Validate upgrade inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.isUpgrade }}" == "true" && -z "${{ inputs.oldBuildNumber }}" ]]; then
            echo "ERROR: oldBuildNumber is REQUIRED when isUpgrade=true"
            exit 1
          fi

      - name: Resolve selector from TAGS
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          TESTCASE_ID=""
          CATEGORY=""
          TAGS_RAW="${{ inputs.TAGS }}"

          trim() { echo "$1" | xargs; }

          if [[ -n "$(trim "${TAGS_RAW}")" ]]; then
            sel=""
            IFS=',' read -ra parts <<< "${TAGS_RAW}"
            for p in "${parts[@]}"; do
              t="$(trim "$p")"
              if [[ -n "$t" ]]; then
                sel="$t"
                break
              fi
            done

            sel="${sel#@}"
            sel="$(trim "$sel")"

            if [[ "$sel" == *:* ]]; then
              echo "ERROR: TAGS format '@key:value' is not supported. Use '@TC-1234' or '@category'."
              exit 1
            fi

            if [[ "$sel" =~ ^TC-[0-9]+$ ]]; then
              TESTCASE_ID="$sel"
            else
              CATEGORY="$sel"
            fi
          fi

          echo "testCaseId=$TESTCASE_ID" >> "$GITHUB_OUTPUT"
          echo "category=$CATEGORY" >> "$GITHUB_OUTPUT"

      - name: Print resolved selectors
        shell: bash
        run: |
          set -euo pipefail
          echo "TAGS=${{ inputs.TAGS }}"
          echo "resolvedTestCaseId=${{ steps.resolve.outputs.testCaseId }}"
          echo "resolvedCategory=${{ steps.resolve.outputs.category }}"

  run-android-ui-tests-placeholder:
    name: Runner smoke check + checkout (no test execution yet)
    runs-on:
      - self-hosted
      - Linux
      - X64
      - office
      - android-qa

    needs: validate-and-resolve-inputs

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code at selected branch/ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          clean: true

      #  Gradle needs Java. Self-hosted runner doesn't have it configured.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify Java (debug)
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Remove any leftover secrets files (safety)
        run: |
          set -euo pipefail
          rm -f secrets.json
          rm -f "${RUNNER_TEMP}/secrets.json"

      - name: Show checked out ref
        run: |
          set -euo pipefail
          echo "Checked out ref input: ${{ inputs.branch }}"
          echo "Git HEAD commit: $(git rev-parse HEAD)"
          echo "Git branch (may be 'HEAD' if detached): $(git rev-parse --abbrev-ref HEAD)"

      - name: Ensure ADB is available (no sudo)
        run: |
          set -euo pipefail

          if command -v adb >/dev/null 2>&1; then
            echo "adb already available: $(command -v adb)"
            adb version
            exit 0
          fi

          if ! command -v curl >/dev/null 2>&1; then
            echo "ERROR: 'curl' is not available on this runner."
            exit 1
          fi

          if ! command -v unzip >/dev/null 2>&1; then
            echo "ERROR: 'unzip' is not available on this runner."
            exit 1
          fi

          echo "adb not found. Installing Android platform-tools locally..."
          ADB_ROOT="${RUNNER_TEMP}/android-platform-tools"
          ZIP_PATH="${RUNNER_TEMP}/platform-tools.zip"

          rm -rf "${ADB_ROOT}" "${ZIP_PATH}"
          mkdir -p "${ADB_ROOT}"

          curl -fsSL -o "${ZIP_PATH}" \
            https://dl.google.com/android/repository/platform-tools-latest-linux.zip

          unzip -oq "${ZIP_PATH}" -d "${ADB_ROOT}"
          rm -f "${ZIP_PATH}"

          echo "${ADB_ROOT}/platform-tools" >> "${GITHUB_PATH}"
          "${ADB_ROOT}/platform-tools/adb" version

      - name: Select target device (androidDeviceId optional)
        run: |
          set -euo pipefail

          echo "adb devices -l"
          adb devices -l

          online_count="$(adb devices | awk 'NR>1 && $2=="device"{c++} END{print c+0}')"
          if [[ "$online_count" -eq 0 ]]; then
            echo "ERROR: No online Android devices found on this runner."
            exit 1
          fi

          TARGET="${{ inputs.androidDeviceId }}"
          if [[ -n "$TARGET" ]]; then
            if ! adb devices | awk 'NR>1 && $2=="device"{print $1}' | grep -qx "$TARGET"; then
              echo "ERROR: androidDeviceId '$TARGET' not found in 'adb devices'."
              exit 1
            fi
            SELECTED="$TARGET"
            echo "Using requested device: $SELECTED"
          else
            SELECTED="$(adb devices | awk 'NR>1 && $2=="device"{print $1; exit}')"
            echo "No androidDeviceId provided -> auto-selected: $SELECTED"
          fi

          echo "ANDROID_SERIAL=$SELECTED" >> "$GITHUB_ENV"

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Fetch secrets.json from 1Password (runtime only)
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]]; then
            echo "ERROR: OP_SERVICE_ACCOUNT_TOKEN is not set in GitHub repo secrets."
            exit 1
          fi

          chmod +x ./gradlew

          SECRETS_FILE="${RUNNER_TEMP}/secrets.json"
          export SECRETS_JSON_PATH="${SECRETS_FILE}"
          echo "SECRETS_JSON_PATH=${SECRETS_FILE}" >> "$GITHUB_ENV"

          ./gradlew :tests:testsSupport:fetchSecrets --no-daemon -PsecretsJsonPath="${SECRETS_FILE}"

          test -s "${SECRETS_FILE}"
          chmod 600 "${SECRETS_FILE}"
          echo "OK: secrets.json created at ${SECRETS_FILE}"

      - name: Gradle sanity check (assemble only, still no test execution)
        run: |
          set -euo pipefail
          ./gradlew :tests:testsCore:assembleDebugAndroidTest --no-daemon

      - name: Show what would run (preview only)
        run: |
          set -euo pipefail

          echo "=== PLACEHOLDER (NO TEST EXECUTION YET) ==="
          echo "branch=${{ inputs.branch }}"
          echo "appBuildNumber=${{ inputs.appBuildNumber }}"
          echo "isUpgrade=${{ inputs.isUpgrade }}"
          echo "oldBuildNumber=${{ inputs.oldBuildNumber }}"
          echo "enforceAppInstall=${{ inputs.enforceAppInstall }}"
          echo "flavor=${{ inputs.flavor }}"
          echo "buildType=${{ inputs.buildType }}"
          echo "backendType=${{ inputs.backendType }}"
          echo "testinyRunName=${{ inputs.testinyRunName }}"
          echo "androidDeviceId=${{ inputs.androidDeviceId }}"
          echo "callingServiceEnv=${{ inputs.callingServiceEnv }}"
          echo "callingServiceUrl=${{ inputs.callingServiceUrl }}"
          echo "deflakeCount=${{ inputs.deflakeCount }}"
          echo "TAGS=${{ inputs.TAGS }}"
          echo "ANDROID_SERIAL=${ANDROID_SERIAL}"
          echo ""
          echo "resolvedTestCaseId=${{ needs.validate-and-resolve-inputs.outputs.resolvedTestCaseId }}"
          echo "resolvedCategory=${{ needs.validate-and-resolve-inputs.outputs.resolvedCategory }}"
          echo ""

          tc="${{ needs.validate-and-resolve-inputs.outputs.resolvedTestCaseId }}"
          cat="${{ needs.validate-and-resolve-inputs.outputs.resolvedCategory }}"

          cmd=( "./gradlew" ":tests:testsCore:connectedDebugAndroidTest" )
          if [[ -n "$tc" ]]; then
            cmd+=( "-Pandroid.testInstrumentationRunnerArguments.testCaseId=${tc}" )
          fi
          if [[ -n "$cat" ]]; then
            cmd+=( "-Pandroid.testInstrumentationRunnerArguments.category=${cat}" )
          fi

          echo "=== FUTURE GRADLE COMMAND (PREVIEW ONLY) ==="
          printf '%q ' "${cmd[@]}"
          echo

      - name: Cleanup secrets + workspace outputs
        if: always()
        run: |
          set -euo pipefail
          rm -f secrets.json
          rm -f "${RUNNER_TEMP}/secrets.json"
          git clean -ffdx

