name: "Select Runner"

on:
  workflow_call:
    inputs:
      required-labels:
        description: "JSON array of labels that define the preferred self-hosted runner pool"
        required: true
        type: string
      min-idle-runners:
        description: "Minimum number of idle runners matching required-labels before selecting that pool"
        required: false
        default: 1
        type: number
      fallback-label:
        description: "Fallback runner label used when preferred self-hosted pool is unavailable"
        required: false
        default: "ubuntu-latest"
        type: string
    secrets:
      runner-token:
        description: "Token with administration read access to list self-hosted runners"
        required: false
    outputs:
      runs_on:
        description: "JSON array used by runs-on"
        value: ${{ jobs.select.outputs.runs_on }}

permissions:
  actions: read
  contents: read

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
    steps:
      - id: pick
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.runner-token }}
          script: |
            const fallback = ['${{ inputs.fallback-label }}'];
            try {
              const required = JSON.parse('${{ inputs.required-labels }}');
              const minIdle = Number('${{ inputs.min-idle-runners }}');

              const repoData = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.info(`Discovered repository-level runners: ${repoData.data.runners.length}`);

              const orgData = await github.rest.actions.listSelfHostedRunnersForOrg({
                org: context.repo.owner
              });
              core.info(`Discovered organization-level runners: ${orgData.data.runners.length}`);

              const allRunners = [...repoData.data.runners, ...orgData.data.runners];
              core.info(`Total runners (repo + org): ${allRunners.length}`);

              allRunners.forEach((runner) => {
                const labelNames = runner.labels.map((label) => label.name).join(", ");
                core.info(
                  `Runner '${runner.name}': status=${runner.status}, busy=${runner.busy}, labels=[${labelNames}]`
                );
              });

              const idleMatchingRunners = allRunners.filter((runner) => {
                if (runner.status !== "online" || runner.busy) {
                  core.info(`Skipping '${runner.name}' because it is not idle online.`);
                  return false;
                }
                const labels = new Set(runner.labels.map((label) => label.name));
                const missing = required.filter((name) => !labels.has(name));
                if (missing.length > 0) {
                  core.info(`Skipping '${runner.name}' due to missing labels: [${missing.join(", ")}]`);
                  return false;
                }
                core.info(`'${runner.name}' matches required labels and is idle online.`);
                return true;
              }).length;

              const hasIdleCapacity = Number.isFinite(minIdle)
                ? idleMatchingRunners >= minIdle
                : idleMatchingRunners >= 1;

              const selected = hasIdleCapacity ? required : fallback;
              core.info(`Idle matching runners: ${idleMatchingRunners}, minimum required: ${minIdle}`);
              core.info(`Selected runner labels: ${JSON.stringify(selected)}`);
              core.setOutput("runs_on", JSON.stringify(selected));
            } catch (error) {
              core.warning(`Falling back to ${fallback[0]}: ${error.message}`);
              core.setOutput("runs_on", JSON.stringify(fallback));
            }
