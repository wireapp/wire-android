name: "Select Runner"

on:
  workflow_call:
    inputs:
      required-labels:
        description: "JSON array of labels that define the preferred self-hosted runner pool"
        required: true
        type: string
      min-idle-runners:
        description: "Minimum number of idle runners matching required-labels before selecting that pool"
        required: false
        default: 1
        type: number
      fallback-label:
        description: "Fallback runner label used when preferred self-hosted pool is unavailable"
        required: false
        default: "ubuntu-latest"
        type: string
    secrets:
      runner_token:
        description: "Token with administration read access to list self-hosted runners"
        required: false
    outputs:
      runs_on:
        description: "JSON array used by runs-on"
        value: ${{ jobs.select.outputs.runs_on }}

permissions:
  actions: read
  contents: read

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: pick
        name: Select runner pool
        env:
          RUNNER_TOKEN: ${{ secrets.runner_token }}
          REQUIRED_LABELS: ${{ inputs.required-labels }}
          MIN_IDLE_RUNNERS: ${{ inputs.min-idle-runners }}
          FALLBACK_LABEL: ${{ inputs.fallback-label }}
        run: |
          runs_on=$(python3 scripts/select_runner.py)
          echo "runs_on=$runs_on" >> "$GITHUB_OUTPUT"
