name: "Select Runner"

on:
  workflow_call:
    inputs:
      required-labels:
        description: "JSON array of labels that define the preferred self-hosted runner pool"
        required: true
        type: string
      min-idle-runners:
        description: "Minimum number of idle runners matching required-labels before selecting that pool"
        required: false
        default: 1
        type: number
      fallback-label:
        description: "Fallback runner label used when preferred self-hosted pool is unavailable"
        required: false
        default: "ubuntu-latest"
        type: string
    secrets:
      runner-token:
        description: "Token with administration read access to list self-hosted runners"
        required: false
    outputs:
      runs_on:
        description: "JSON array used by runs-on"
        value: ${{ jobs.select.outputs.runs_on }}

permissions:
  actions: read
  contents: read

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      runs_on: ${{ steps.pick.outputs.runs_on }}
    steps:
      - id: pick
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.runner-token }}
          script: |
            const fallback = ['${{ inputs.fallback-label }}'];
            try {
              const required = JSON.parse('${{ inputs.required-labels }}');
              const minIdle = Number('${{ inputs.min-idle-runners }}');

              const { data } = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo
              });

              const idleMatchingRunners = data.runners.filter((runner) => {
                if (runner.status !== "online" || runner.busy) return false;
                const labels = new Set(runner.labels.map((label) => label.name));
                return required.every((name) => labels.has(name));
              }).length;

              const hasIdleCapacity = Number.isFinite(minIdle)
                ? idleMatchingRunners >= minIdle
                : idleMatchingRunners >= 1;

              const selected = hasIdleCapacity ? required : fallback;
              core.info(`Idle matching runners: ${idleMatchingRunners}, minimum required: ${minIdle}`);
              core.info(`Selected runner labels: ${JSON.stringify(selected)}`);
              core.setOutput("runs_on", JSON.stringify(selected));
            } catch (error) {
              core.warning(`Falling back to ${fallback[0]}: ${error.message}`);
              core.setOutput("runs_on", JSON.stringify(fallback));
            }
